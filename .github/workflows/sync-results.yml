name: Sincronizar resultados Mundial 2026

on:
  schedule:
    # Mundial 2026: 11 junio – 19 julio. Cron en horario UTC.
    # España = UTC+2, así que esto cubre tardes-madrugadas.
    - cron: '*/10 15-23 * 6,7 *'   # Tardes/noches de junio y julio
    - cron: '*/10 0-2 * 6,7 *'      # Madrugadas (partidos en USA)
  workflow_dispatch:  # Permite lanzarlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install
        working-directory: scripts

      - name: Sincronizar resultados
        run: node sync-results.js
        working-directory: scripts
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
